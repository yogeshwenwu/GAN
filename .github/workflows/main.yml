name: Test Jupyter Notebook

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  test-notebook:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install nbconvert ipykernel

    - name: Install notebook kernel
      run: |
        python -m ipykernel install --user --name python3 --display-name "Python 3"

    - name: Execute notebook
      run: |
        jupyter nbconvert --to notebook --execute Task_01.ipynb --output notebook_executed.ipynb
      
    - name: Upload executed notebook (optional)
      uses: actions/upload-artifact@v4
      with:
        name: executed-notebook
        path: notebook_executed.ipynb
